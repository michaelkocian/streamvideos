<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VR Video Manager</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0f1a;
      color: #d8d8e8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 12px;
      line-height: 1.4;
    }

    /* Header */
    .header {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid #2a2a3e;
    }

    .header h1 {
      font-size: 1.3em;
      color: #00c8ff;
      flex-shrink: 0;
    }

    .search-box {
      flex: 1;
      min-width: 180px;
      padding: 10px 14px;
      background: #1a1a2e;
      border: 1px solid #3a3a50;
      border-radius: 6px;
      color: #d8d8e8;
      font-size: 16px;
      outline: none;
    }

    .search-box:focus { border-color: #00c8ff; }

    .sort-select {
      padding: 10px 12px;
      background: #1a1a2e;
      border: 1px solid #3a3a50;
      border-radius: 6px;
      color: #d8d8e8;
      font-size: 14px;
      outline: none;
    }

    .stats {
      font-size: 0.82em;
      color: #6a6a80;
      margin-bottom: 8px;
    }

    .legend {
      display: inline-flex;
      gap: 10px;
      margin-left: 16px;
      font-size: 0.82em;
      color: #6a6a80;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .legend-swatch {
      width: 12px;
      height: 12px;
      border-radius: 2px;
      display: inline-block;
    }

    /* Video list */
    .video-list {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .video-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      background: #151528;
      border-radius: 5px;
      border-left: 4px solid transparent;
      cursor: pointer;
      transition: background 0.15s;
      min-height: 44px; /* touch-friendly */
    }

    .video-item:hover { background: #1e1e38; }

    .video-item .name {
      flex: 1;
      font-size: 13.5px;
      word-break: break-word;
      min-width: 0;
      color: #c0d0ff;
    }

    .video-item:hover .name { color: #80dfff; }

    .video-item .size {
      flex-shrink: 0;
      font-size: 12.5px;
      color: #5a5a70;
      min-width: 70px;
      text-align: right;
    }

    .stars {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      gap: 1px;
      white-space: nowrap;
    }

    .stars .star {
      cursor: pointer;
      font-size: 18px;
      padding: 2px 1px;
      min-width: 22px;
      min-height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      transition: transform 0.1s;
    }

    .stars .star:hover { transform: scale(1.3); }

    .star-black { color: #1a1a1a; text-shadow: 0 0 1px #808080; }
    .star-black.active { color: #808080; text-shadow: 0 0 2px #888; }
    .star-yellow { color: #3a3a3a; }
    .star-yellow.active { color: #ffd700; text-shadow: 0 0 4px rgba(255, 215, 0, 0.4); }

    .stars .sep {
      width: 6px;
      display: inline-block;
    }

    .modal-stars {
      display: inline-flex;
      align-items: center;
      gap: 1px;
      margin-top: 4px;
    }

    .modal-stars .star { font-size: 24px; min-width: 28px; min-height: 40px; }

    .video-item .delete-btn {
      flex-shrink: 0;
      padding: 6px 10px;
      background: #862040;
      border: none;
      border-radius: 4px;
      color: #ffb0b0;
      cursor: pointer;
      font-size: 14px;
      min-height: 36px;
      min-width: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .video-item .delete-btn:hover { background: #b02040; }

    /* Recently played intensities - border + subtle bg tint */
    .played-1 { border-left-color: #00c8ff !important; background: rgba(0, 200, 255, 0.10) !important; }
    .played-2 { border-left-color: rgba(0, 200, 255, 0.72) !important; background: rgba(0, 200, 255, 0.07) !important; }
    .played-3 { border-left-color: rgba(0, 200, 255, 0.48) !important; background: rgba(0, 200, 255, 0.05) !important; }
    .played-4 { border-left-color: rgba(0, 200, 255, 0.30) !important; background: rgba(0, 200, 255, 0.03) !important; }
    .played-5 { border-left-color: rgba(0, 200, 255, 0.16) !important; background: rgba(0, 200, 255, 0.015) !important; }

    /* Video modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.94);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    .modal-overlay.active { display: flex; }

    .modal-close {
      position: absolute;
      top: 10px;
      right: 18px;
      font-size: 36px;
      color: #fff;
      background: none;
      border: none;
      cursor: pointer;
      z-index: 1001;
      padding: 10px;
      min-width: 56px;
      min-height: 56px;
    }

    .modal-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 10px;
      max-width: 90vw;
      padding: 0 60px;
    }

    .modal-title {
      color: #00c8ff;
      font-size: 1em;
      text-align: center;
      word-break: break-word;
    }

    #videoPlayer {
      max-width: 95vw;
      max-height: 82vh;
      background: #000;
    }

    /* Confirm dialog */
    .confirm-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.82);
      z-index: 2000;
      justify-content: center;
      align-items: center;
    }

    .confirm-overlay.active { display: flex; }

    .confirm-box {
      background: #1a1a30;
      padding: 24px;
      border-radius: 10px;
      max-width: 480px;
      width: 90%;
      text-align: center;
      border: 1px solid #3a3a50;
    }

    .confirm-box p {
      margin-bottom: 20px;
      word-break: break-word;
      line-height: 1.5;
    }

    .confirm-box .btns {
      display: flex;
      gap: 14px;
      justify-content: center;
    }

    .confirm-box button {
      padding: 12px 28px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 15px;
      min-height: 48px;
      min-width: 100px;
    }

    .btn-danger { background: #c0303e; color: #fff; }
    .btn-danger:hover { background: #e03040; }
    .btn-cancel { background: #3a3a50; color: #d8d8e8; }
    .btn-cancel:hover { background: #4a4a60; }

    .loading {
      text-align: center;
      padding: 50px;
      color: #5a5a70;
      font-size: 1.1em;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>VR Videos</h1>
    <input type="text" class="search-box" id="searchBox" placeholder="Search videos..." autocomplete="off">
    <select class="sort-select" id="sortBy">
      <option value="name-asc">Name A-Z</option>
      <option value="name-desc">Name Z-A</option>
      <option value="size-desc">Size large first</option>
      <option value="size-asc">Size small first</option>
      <option value="rating-desc">Rating high first</option>
      <option value="rating-asc">Rating low first</option>
      <option value="modified-desc">Newest first</option>
      <option value="modified-asc">Oldest first</option>
    </select>
  </div>

  <div id="statsBar">
    <span class="stats" id="stats"></span>
    <span class="legend">
      <span class="legend-item"><span class="legend-swatch" style="background:#00c8ff"></span>last</span>
      <span class="legend-item"><span class="legend-swatch" style="background:rgba(0,200,255,0.48)"></span>3rd ago</span>
      <span class="legend-item"><span class="legend-swatch" style="background:rgba(0,200,255,0.16)"></span>5th ago</span>
    </span>
  </div>

  <div class="video-list" id="videoList">
    <div class="loading">Loading videos...</div>
  </div>

  <!-- Video Player Modal -->
  <div class="modal-overlay" id="videoModal">
    <button class="modal-close" id="modalClose">&#x2715;</button>
    <div class="modal-header">
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-stars" id="modalStars"></div>
    </div>
    <video id="videoPlayer" controls autoplay playsinline></video>
  </div>

  <!-- Delete Confirmation -->
  <div class="confirm-overlay" id="confirmDialog">
    <div class="confirm-box">
      <p id="confirmText"></p>
      <div class="btns">
        <button class="btn-danger" id="confirmYes">Delete</button>
        <button class="btn-cancel" id="confirmNo">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    // --- State ---
    let videos = [];
    let recentlyPlayed = JSON.parse(localStorage.getItem('vr_recent') || '[]');
    let deleteTarget = null;

    // --- DOM refs ---
    const videoList = document.getElementById('videoList');
    const searchBox = document.getElementById('searchBox');
    const sortBy = document.getElementById('sortBy');
    const stats = document.getElementById('stats');
    const videoModal = document.getElementById('videoModal');
    const videoPlayer = document.getElementById('videoPlayer');
    const modalTitle = document.getElementById('modalTitle');
    const confirmDialog = document.getElementById('confirmDialog');
    const confirmText = document.getElementById('confirmText');

    // --- Helpers ---
    function fmtSize(bytes) {
      if (bytes >= 1073741824) return (bytes / 1073741824).toFixed(1) + ' GB';
      if (bytes >= 1048576) return (bytes / 1048576).toFixed(0) + ' MB';
      return (bytes / 1024).toFixed(0) + ' KB';
    }

    function buildStars(videoName, currentRating, extraClass) {
      const container = document.createElement('span');
      container.className = 'stars' + (extraClass ? ' ' + extraClass : '');

      // 3 black stars for negative ratings (-3, -2, -1)
      for (let i = -1; i <= -1; i++) {
        const s = document.createElement('span');
        s.className = 'star star-black' + (currentRating !== null && currentRating <= i ? ' active' : '');
        s.textContent = '\u2605';
        s.title = String(i);
        s.onclick = e => {
          e.stopPropagation();
          const newRating = (currentRating === i) ? 0 : i;
          rateVideo(videoName, newRating);
        };
        container.appendChild(s);
      }

      // separator
      const sep = document.createElement('span');
      sep.className = 'sep';
      container.appendChild(sep);

      // 5 yellow stars for positive ratings (1-5)
      for (let i = 1; i <= 5; i++) {
        const s = document.createElement('span');
        s.className = 'star star-yellow' + (currentRating !== null && currentRating >= i ? ' active' : '');
        s.textContent = '\u2605';
        s.title = '+' + i;
        s.onclick = e => {
          e.stopPropagation();
          const newRating = (currentRating === i) ? 0 : i;
          rateVideo(videoName, newRating);
        };
        container.appendChild(s);
      }

      return container;
    }

    // --- Data ---
    async function loadVideos() {
      try {
        const res = await fetch('/api/videos');
        if (!res.ok) throw new Error();
        videos = await res.json();
        renderList();
      } catch {
        videoList.innerHTML = '<div class="loading">Failed to load videos. Is the server running?</div>';
      }
    }

    function getFiltered() {
      const q = searchBox.value.toLowerCase().trim();
      let list = q ? videos.filter(v => v.name.toLowerCase().includes(q)) : videos.slice();

      const [field, dir] = sortBy.value.split('-');
      const m = dir === 'asc' ? 1 : -1;

      list.sort((a, b) => {
        switch (field) {
          case 'name': return a.name.localeCompare(b.name) * m;
          case 'size': return (a.size - b.size) * m;
          case 'rating': return ((a.rating ?? -99) - (b.rating ?? -99)) * m;
          case 'modified': return (a.modified - b.modified) * m;
          default: return 0;
        }
      });

      return list;
    }

    // --- Render ---
    function renderList() {
      const filtered = getFiltered();
      const totalSize = filtered.reduce((s, v) => s + v.size, 0);
      const extra = filtered.length !== videos.length ? ` (${videos.length} total)` : '';
      stats.textContent = `${filtered.length} videos \u2022 ${fmtSize(totalSize)}${extra}`;

      const frag = document.createDocumentFragment();

      for (const video of filtered) {
        const pIdx = recentlyPlayed.indexOf(video.name);
        const row = document.createElement('div');
        row.className = 'video-item' + (pIdx >= 0 && pIdx < 5 ? ' played-' + (pIdx + 1) : '');
        row.onclick = () => playVideo(video.name);

        // Name
        const nameEl = document.createElement('span');
        nameEl.className = 'name';
        nameEl.textContent = video.name;

        // Size
        const sizeEl = document.createElement('span');
        sizeEl.className = 'size';
        sizeEl.textContent = fmtSize(video.size);

        // Star rating
        const starsEl = buildStars(video.name, video.rating);

        // Delete button
        const del = document.createElement('button');
        del.className = 'delete-btn';
        del.innerHTML = '&#x1F5D1;';
        del.title = 'Delete video';
        del.onclick = e => {
          e.stopPropagation();
          showDeleteConfirm(video.name);
        };

        row.appendChild(nameEl);
        row.appendChild(sizeEl);
        row.appendChild(starsEl);
        row.appendChild(del);
        frag.appendChild(row);
      }

      videoList.innerHTML = '';
      videoList.appendChild(frag);
    }

    // --- Video playback ---
    function playVideo(name) {
      recentlyPlayed = recentlyPlayed.filter(n => n !== name);
      recentlyPlayed.unshift(name);
      if (recentlyPlayed.length > 5) recentlyPlayed.length = 5;
      localStorage.setItem('vr_recent', JSON.stringify(recentlyPlayed));

      modalTitle.textContent = name;
      const v = videos.find(v => v.name === name);
      const modalStars = document.getElementById('modalStars');
      modalStars.innerHTML = '';
      modalStars.appendChild(buildStars(name, v ? v.rating : null, 'modal-stars'));
      videoPlayer.src = '/api/stream/' + encodeURIComponent(name);
      videoModal.classList.add('active');
      renderList();
    }

    function closeModal() {
      videoModal.classList.remove('active');
      videoPlayer.pause();
      videoPlayer.removeAttribute('src');
      videoPlayer.load(); // release memory
    }

    document.getElementById('modalClose').onclick = closeModal;
    videoModal.onclick = e => { if (e.target === videoModal) closeModal(); };

    // --- Rating ---
    async function rateVideo(name, rating) {
      try {
        await fetch('/api/rate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, rating })
        });
        const v = videos.find(v => v.name === name);
        if (v) v.rating = rating;
        renderList();
        // update modal stars if open
        const modalStars = document.getElementById('modalStars');
        if (videoModal.classList.contains('active') && modalTitle.textContent === name) {
          modalStars.innerHTML = '';
          modalStars.appendChild(buildStars(name, rating, 'modal-stars'));
        }
      } catch {
        // silently fail, will sync on reload
      }
    }

    // --- Delete ---
    function showDeleteConfirm(name) {
      deleteTarget = name;
      confirmText.textContent = 'Permanently delete "' + name + '"? This cannot be undone.';
      confirmDialog.classList.add('active');
    }

    document.getElementById('confirmNo').onclick = () => {
      confirmDialog.classList.remove('active');
      deleteTarget = null;
    };

    document.getElementById('confirmYes').onclick = async () => {
      if (!deleteTarget) return;
      const name = deleteTarget;
      confirmDialog.classList.remove('active');
      deleteTarget = null;

      try {
        const res = await fetch('/api/videos/' + encodeURIComponent(name), { method: 'DELETE' });
        if (res.ok) {
          videos = videos.filter(v => v.name !== name);
          recentlyPlayed = recentlyPlayed.filter(n => n !== name);
          localStorage.setItem('vr_recent', JSON.stringify(recentlyPlayed));
          renderList();
        } else {
          alert('Delete failed.');
        }
      } catch {
        alert('Delete failed.');
      }
    };

    // --- Search & Sort ---
    let searchTimer;
    searchBox.oninput = () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(renderList, 150);
    };
    sortBy.onchange = renderList;

    // --- Keyboard ---
    document.onkeydown = e => {
      if (e.key === 'Escape') {
        if (confirmDialog.classList.contains('active')) {
          confirmDialog.classList.remove('active');
          deleteTarget = null;
        } else if (videoModal.classList.contains('active')) {
          closeModal();
        }
      }
    };

    // --- Init ---
    loadVideos();
  </script>
</body>
</html>
