<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VR Video Manager</title>
  <link rel="stylesheet" href="styles.css">
    
</head>
<body>
  <div class="header">
    <h1 id="homeTitle" style="cursor:pointer;">Stream Videos</h1>
    <div style="position:relative;display:inline-block;min-width:180px;width:100%;max-width:340px;">
      <input type="text" class="search-box" id="searchBox" placeholder="Search videos..." autocomplete="off" style="width:100%;">
      <button id="searchDropdown" style="display:block;position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:#888;font-size:20px;cursor:pointer;padding:0 6px;">&#x25BC;</button>
      <button id="searchClear" style="display:none;position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:#888;font-size:20px;cursor:pointer;padding:0 6px;">&#x2715;</button>
      <div id="starDropdown" style="display:none;position:absolute;top:100%;right:0;z-index:10;background:#222;border:1px solid #444;padding:6px 10px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.2);min-width:140px;">
        <div style="display:flex;align-items:center;gap:6px;">
          <span class="star star-black" data-star="-1" title="-1">&#9733;</span>
          <span class="sep"></span>
          <span class="star star-yellow" data-star="1" title="1">&#9733;</span>
          <span class="star star-yellow" data-star="2" title="2">&#9733;</span>
          <span class="star star-yellow" data-star="3" title="3">&#9733;</span>
          <span class="star star-yellow" data-star="4" title="4">&#9733;</span>
          <span class="star star-yellow" data-star="5" title="5">&#9733;</span>
        </div>
      </div>
    </div>
    <select class="sort-select" id="sortBy">
      <option value="name-asc">Name A-Z</option>
      <option value="name-desc">Name Z-A</option>
      <option value="size-desc">Size large first</option>
      <option value="size-asc">Size small first</option>
      <option value="rating-desc">Rating high first</option>
      <option value="rating-asc">Rating low first</option>
      <option value="modified-desc">Newest first</option>
      <option value="modified-asc">Oldest first</option>
    </select>
    <div class="grid-control">
      <label>Zoom</label>
      <input type="range" class="grid-slider" id="gridSlider" min="1" max="6" value="1">
    </div>
  </div>

  <div class="breadcrumb" id="breadcrumb"></div>

  <div id="statsBar">
    <span class="stats" id="stats"></span>
    <span class="legend">
      <span class="legend-item"><span class="legend-swatch" style="background:#00c8ff"></span>last</span>
      <span class="legend-item"><span class="legend-swatch" style="background:rgba(0,200,255,0.48)"></span>3rd ago</span>
      <span class="legend-item"><span class="legend-swatch" style="background:rgba(0,200,255,0.16)"></span>5th ago</span>
    </span>
  </div>

  <div class="video-list" id="videoList">
    <div class="loading">Loading videos...</div>
  </div>

  <!-- Video Player Modal -->
  <div class="modal-overlay" id="videoModal">
    <button class="modal-close" id="modalClose">&#x2715;</button>
    <div class="modal-header">
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-stars" id="modalStars"></div>
    </div>
    <video id="videoPlayer" controls autoplay playsinline></video>
  </div>

  <!-- Delete Confirmation -->
  <div class="confirm-overlay" id="confirmDialog">
    <div class="confirm-box">
      <p id="confirmText"></p>
      <div class="btns">
        <button class="btn-danger" id="confirmYes">Delete</button>
        <button class="btn-cancel" id="confirmNo">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    // --- State ---
    let items = [];
    let currentDir = '';
    let recentlyPlayed = JSON.parse(localStorage.getItem('vr_recent') || '[]');
    let deleteTarget = null;
    let gridCols = parseInt(localStorage.getItem('vr_grid') || '1', 10);

    // --- DOM refs ---
    const videoList = document.getElementById('videoList');
    const searchBox = document.getElementById('searchBox');
    const sortBy = document.getElementById('sortBy');
    const stats = document.getElementById('stats');
    const searchDropdown = document.getElementById('searchDropdown');
    const searchClear = document.getElementById('searchClear');
    const starDropdown = document.getElementById('starDropdown');
    let selectedStar = null;
    const videoModal = document.getElementById('videoModal');
    const videoPlayer = document.getElementById('videoPlayer');
    const modalTitle = document.getElementById('modalTitle');
    const confirmDialog = document.getElementById('confirmDialog');
    const confirmText = document.getElementById('confirmText');
    const gridSlider = document.getElementById('gridSlider');
    const breadcrumb = document.getElementById('breadcrumb');
    const homeTitle = document.getElementById('homeTitle');

    gridSlider.value = gridCols;
    applyGrid();

    // --- HomeTitle click ---
    homeTitle.onclick = () => {
      searchBox.value = '';
      selectedStar = null;
      searchBox.placeholder = 'Search videos...';
      searchDropdown.style.display = 'block';
      searchClear.style.display = 'none';
      navigateTo('');
    };

    // --- Helpers ---
    function fmtSize(bytes) {
      if (bytes >= 1073741824) return (bytes / 1073741824).toFixed(1) + ' GB';
      if (bytes >= 1048576) return (bytes / 1048576).toFixed(0) + ' MB';
      return (bytes / 1024).toFixed(0) + ' KB';
    }

    function videoKey(name) {
      return currentDir ? currentDir + '/' + name : name;
    }

    function applyGrid() {
      videoList.className = 'video-list' + (gridCols > 1 ? ' cols-' + gridCols : '');
    }

    function buildStars(videoName, currentRating, extraClass) {
      const container = document.createElement('span');
      container.className = 'stars' + (extraClass ? ' ' + extraClass : '');

      // Only allow rating if extraClass is 'modal-stars'
      const allowRate = extraClass === 'modal-stars';

      // 3 black stars for negative ratings (-3, -2, -1)
      for (let i = -1; i <= -1; i++) {
        const s = document.createElement('span');
        s.className = 'star star-black' + (currentRating !== null && currentRating <= i ? ' active' : '');
        s.textContent = '\u2605';
        s.title = String(i);
        if (allowRate) {
          s.onclick = e => {
            e.stopPropagation();
            const newRating = (currentRating === i) ? 0 : i;
            rateVideo(videoName, newRating);
          };
        }
        container.appendChild(s);
      }

      // separator
      const sep = document.createElement('span');
      sep.className = 'sep';
      container.appendChild(sep);

      // 5 yellow stars for positive ratings (1-5)
      for (let i = 1; i <= 5; i++) {
        const s = document.createElement('span');
        s.className = 'star star-yellow' + (currentRating !== null && currentRating >= i ? ' active' : '');
        s.textContent = '\u2605';
        s.title = '+' + i;
        if (allowRate) {
          s.onclick = e => {
            e.stopPropagation();
            const newRating = (currentRating === i) ? 0 : i;
            rateVideo(videoName, newRating);
          };
        }
        container.appendChild(s);
      }

      // If not modal, add dropdown for rating
      if (!allowRate) {
        container.onmouseenter = function(e) {
          if (container.querySelector('.dropdown-rating')) return;
          const dropdown = document.createElement('div');
          dropdown.className = 'dropdown-rating';

          // Build interactive stars for dropdown
          const ddStars = document.createElement('span');
          ddStars.className = 'stars dropdown-stars';
          // Black star
          for (let i = -1; i <= -1; i++) {
            const s = document.createElement('span');
            s.className = 'star star-black' + (currentRating !== null && currentRating <= i ? ' active' : '');
            s.textContent = '\u2605';
            s.title = String(i);
            s.onclick = e => {
              e.stopPropagation();
              const newRating = (currentRating === i) ? 0 : i;
              rateVideo(videoName, newRating);
              dropdown.remove();
            };
            ddStars.appendChild(s);
          }
          // separator
          const sep = document.createElement('span');
          sep.className = 'sep';
          ddStars.appendChild(sep);
          // Yellow stars
          for (let i = 1; i <= 5; i++) {
            const s = document.createElement('span');
            s.className = 'star star-yellow' + (currentRating !== null && currentRating >= i ? ' active' : '');
            s.textContent = '\u2605';
            s.title = '+' + i;
            s.onclick = e => {
              e.stopPropagation();
              const newRating = (currentRating === i) ? 0 : i;
              rateVideo(videoName, newRating);
              dropdown.remove();
            };
            ddStars.appendChild(s);
          }
          dropdown.appendChild(ddStars);

          // Remove dropdown on mouseleave
          dropdown.onmouseleave = () => dropdown.remove();
          container.appendChild(dropdown);
        };
        container.onmouseleave = function(e) {
          const dd = container.querySelector('.dropdown-rating');
          if (dd) dd.remove();
        };
        container.style.position = 'relative';
        container.style.cursor = 'pointer';
      }

      return container;
    }

    // --- Breadcrumb ---
    function renderBreadcrumb() {
      breadcrumb.innerHTML = '';
      const parts = currentDir ? currentDir.split('/') : [];

      const root = document.createElement('button');
      root.className = 'bc-link';
      root.textContent = '\uD83C\uDFE0 Root';
      root.onclick = () => {
        searchBox.value = '';
        selectedStar = null;
        searchBox.placeholder = 'Search videos...';
        searchDropdown.style.display = 'block';
        searchClear.style.display = 'none';
        navigateTo('');
      };
      breadcrumb.appendChild(root);

      let accumulated = '';
      for (let i = 0; i < parts.length; i++) {
        const sep = document.createElement('span');
        sep.className = 'bc-sep';
        sep.textContent = ' / ';
        breadcrumb.appendChild(sep);

        accumulated += (i > 0 ? '/' : '') + parts[i];

        if (i < parts.length - 1) {
          const link = document.createElement('button');
          link.className = 'bc-link';
          link.textContent = parts[i];
          const target = accumulated;
          link.onclick = () => navigateTo(target);
          breadcrumb.appendChild(link);
        } else {
          const cur = document.createElement('span');
          cur.className = 'bc-current';
          cur.textContent = parts[i];
          breadcrumb.appendChild(cur);
        }
      }
    }

    // --- Data ---
    function navigateTo(dir) {
      currentDir = dir;
      searchBox.value = '';
      document.getElementById('searchClear').style.display = 'none';
      loadVideos();
    }

    async function loadVideos() {
      try {
        const url = '/api/videos' + (currentDir ? '?dir=' + encodeURIComponent(currentDir) : '');
        const res = await fetch(url);
        if (!res.ok) throw new Error();
        items = await res.json();
        renderBreadcrumb();
        renderList();
      } catch {
        videoList.innerHTML = '<div class="loading">Failed to load videos. Is the server running?</div>';
      }
    }

    async function handleSearch() {
      const q = searchBox.value.trim();
      if (selectedStar !== null) {
        try {
          const res = await fetch('/api/search?rating=' + encodeURIComponent(selectedStar));
          if (!res.ok) throw new Error();
          items = await res.json();
          currentDir = '';
          renderBreadcrumb();
          renderList(true); // flat mode
        } catch {
          videoList.innerHTML = '<div class="loading">Failed to search by stars. Is the server running?</div>';
        }
        return;
      }
      if (!q) {
        loadVideos();
        return;
      }
      try {
        const res = await fetch('/api/search?q=' + encodeURIComponent(q));
        if (!res.ok) throw new Error();
        items = await res.json();
        currentDir = '';
        renderBreadcrumb();
        renderList(true); // flat mode
      } catch {
        videoList.innerHTML = '<div class="loading">Failed to search videos. Is the server running?</div>';
      }
    }

    function getFiltered() {
      const q = searchBox.value.toLowerCase().trim();
      const folders = items.filter(i => i.type === 'folder' && (!q || i.name.toLowerCase().includes(q)));
      let vids = items.filter(i => i.type === 'video');
      if (q) vids = vids.filter(v => v.name.toLowerCase().includes(q));

      const [field, dir] = sortBy.value.split('-');
      const m = dir === 'asc' ? 1 : -1;

      folders.sort((a, b) => a.name.localeCompare(b.name) * m);
      vids.sort((a, b) => {
        switch (field) {
          case 'name': return a.name.localeCompare(b.name) * m;
          case 'size': return (a.size - b.size) * m;
          case 'rating': return ((a.rating ?? -99) - (b.rating ?? -99)) * m;
          case 'modified': return (a.modified - b.modified) * m;
          default: return 0;
        }
      });

      return { folders, videos: vids };
    }

    // --- Render ---
    function renderList(flatMode = false) {
      let folders = [], videos = [];
      if (flatMode) {
        folders = Array.isArray(items) ? items.filter(i => i.type === 'folder') : [];
        videos = Array.isArray(items) ? items.filter(i => i.type === 'video') : [];
      } else {
        const filtered = getFiltered();
        folders = filtered.folders;
        videos = filtered.videos;
      }
      const totalSize = videos.reduce((s, v) => s + v.size, 0);
      const totalVideos = videos.length;
      const folderCount = folders.length;
      const folderText = folderCount > 0 ? ` \u2022 ${folderCount} folders` : '';
      if (typeof stats !== 'undefined' && stats) {
        stats.textContent = `${totalVideos} videos \u2022 ${fmtSize(totalSize)}${folderText}`;
      }
      const frag = document.createDocumentFragment();
      // Render folders
      for (const folder of folders) {
        const row = document.createElement('div');
        row.className = flatMode ? 'folder-item deep-search' : 'folder-item';
        row.onclick = () => navigateTo(currentDir ? currentDir + '/' + folder.name : folder.name);
        const icon = document.createElement('span');
        icon.className = 'folder-icon';
        icon.textContent = '\uD83D\uDCC1';
        const nameEl = document.createElement('span');
        nameEl.className = 'name';
        nameEl.textContent = folder.name;
        row.appendChild(icon);
        row.appendChild(nameEl);
        frag.appendChild(row);
      }
      // Render videos
      for (const video of videos) {
        const key = video.name;
        const pIdx = recentlyPlayed.indexOf(key);
        const row = document.createElement('div');
        row.className = 'video-item deep-search' + (pIdx >= 0 && pIdx < 5 ? ' played-' + (pIdx + 1) : '');
        row.onclick = () => playVideo(video.name);
        const nameEl = document.createElement('span');
        nameEl.className = 'name';
        nameEl.textContent = video.name;
        const sizeEl = document.createElement('span');
        sizeEl.className = 'size';
        sizeEl.textContent = fmtSize(video.size);
        const starsEl = buildStars(video.name, video.rating);
        const del = document.createElement('button');
        del.className = 'delete-btn';
        del.innerHTML = '&#x1F5D1;';
        del.title = 'Delete video';
        del.onclick = e => {
          e.stopPropagation();
          showDeleteConfirm(video.name);
        };
        if (gridCols > 1) {
          row.appendChild(nameEl);
          const metaRow = document.createElement('div');
          metaRow.className = 'meta-row';
          metaRow.appendChild(sizeEl);
          metaRow.appendChild(buildStars(video.name, video.rating));
          metaRow.appendChild(del);
          row.appendChild(metaRow);
        } else {
          row.appendChild(nameEl);
          row.appendChild(sizeEl);
          row.appendChild(starsEl);
          row.appendChild(del);
        }
        frag.appendChild(row);
      }
      videoList.innerHTML = '';
      videoList.appendChild(frag);
    }

    // --- Video playback ---
    function playVideo(name) {
      const key = videoKey(name);
      recentlyPlayed = recentlyPlayed.filter(n => n !== key);
      recentlyPlayed.unshift(key);
      if (recentlyPlayed.length > 5) recentlyPlayed.length = 5;
      localStorage.setItem('vr_recent', JSON.stringify(recentlyPlayed));

      modalTitle.textContent = name;
      const v = items.find(v => v.name === name && v.type === 'video');
      const modalStars = document.getElementById('modalStars');
      modalStars.innerHTML = '';
      modalStars.appendChild(buildStars(name, v ? v.rating : null, 'modal-stars'));
      videoPlayer.src = '/api/stream/' + encodeURIComponent(key);
      videoModal.classList.add('active');
      renderList();
    }

    function closeModal() {
      videoModal.classList.remove('active');
      videoPlayer.pause();
      videoPlayer.removeAttribute('src');
      videoPlayer.load(); // release memory
    }

    document.getElementById('modalClose').onclick = closeModal;
    videoModal.onclick = e => { if (e.target === videoModal) closeModal(); };

    // --- Rating ---
    async function rateVideo(name, rating) {
      const v = items.find(v => v.name === name && v.type === 'video');
      if (!v) return;
      try {
        await fetch('/api/rate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: name, size: v.size, rating })
        });
        v.rating = rating;
        renderList();
        // update modal stars if open
        const modalStars = document.getElementById('modalStars');
        if (videoModal.classList.contains('active') && modalTitle.textContent === name) {
          modalStars.innerHTML = '';
          modalStars.appendChild(buildStars(name, rating, 'modal-stars'));
        }
      } catch {
        // silently fail, will sync on reload
      }
    }

    // --- Delete ---
    function showDeleteConfirm(name) {
      deleteTarget = name;
      confirmText.textContent = 'Permanently delete "' + name + '"? This cannot be undone.';
      confirmDialog.classList.add('active');
    }

    document.getElementById('confirmNo').onclick = () => {
      confirmDialog.classList.remove('active');
      deleteTarget = null;
    };

    document.getElementById('confirmYes').onclick = async () => {
      if (!deleteTarget) return;
      const name = deleteTarget;
      const key = videoKey(name);
      confirmDialog.classList.remove('active');
      deleteTarget = null;

      try {
        const res = await fetch('/api/videos/' + encodeURIComponent(key), { method: 'DELETE' });
        if (res.ok) {
          items = items.filter(v => v.name !== name);
          recentlyPlayed = recentlyPlayed.filter(n => n !== key);
          localStorage.setItem('vr_recent', JSON.stringify(recentlyPlayed));
          renderList();
        } else {
          alert('Delete failed.');
        }
      } catch {
        alert('Delete failed.');
      }
    };

    // --- Grid slider ---
    gridSlider.oninput = () => {
      gridCols = parseInt(gridSlider.value, 10);
      localStorage.setItem('vr_grid', String(gridCols));
      applyGrid();
      renderList();
    };

    // --- Search & Sort ---
    let searchTimer;
    searchBox.oninput = () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(handleSearch, 150);
      document.getElementById('searchClear').style.display = searchBox.value ? 'block' : 'none';
    };
    document.getElementById('searchClear').onclick = () => {
      searchBox.value = '';
      document.getElementById('searchClear').style.display = 'none';
      handleSearch();
    };
    sortBy.onchange = handleSearch;

    // Dropdown arrow click
    searchDropdown.onclick = () => {
      starDropdown.style.display = 'block';
    };

    // Star selection
    starDropdown.onclick = e => {
      if (e.target.classList.contains('star')) {
        selectedStar = e.target.getAttribute('data-star');
        searchBox.value = '';
        starDropdown.style.display = 'none';
        searchDropdown.style.display = 'none';
        searchClear.style.display = 'block';
        handleSearch();
        // Show star in search box visually
        searchBox.placeholder = '★ ' + selectedStar + ' star';
      }
    };

    // Hide dropdown on outside click
    document.addEventListener('click', e => {
      if (!starDropdown.contains(e.target) && e.target !== searchDropdown) {
        starDropdown.style.display = 'none';
      }
    });

    // Clear button
    searchClear.onclick = () => {
      searchBox.value = '';
      selectedStar = null;
      searchBox.placeholder = 'Search videos...';
      searchClear.style.display = 'none';
      searchDropdown.style.display = 'block';
      handleSearch();
    };

    // Search box input
    searchBox.oninput = () => {
      if (searchBox.value) {
        searchDropdown.style.display = 'none';
        searchClear.style.display = 'block';
        selectedStar = null;
        searchBox.placeholder = 'Search videos...';
      } else {
        searchDropdown.style.display = 'block';
        searchClear.style.display = 'none';
      }
      clearTimeout(searchTimer);
      searchTimer = setTimeout(handleSearch, 150);
    };

    // --- Keyboard ---
    document.onkeydown = e => {
      if (e.key === 'Escape') {
        if (confirmDialog.classList.contains('active')) {
          confirmDialog.classList.remove('active');
          deleteTarget = null;
        } else if (videoModal.classList.contains('active')) {
          closeModal();
        }
      }
    };

    // --- Init ---
    loadVideos();
  </script>
</body>
</html>
